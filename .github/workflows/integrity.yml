name: integrity

# Tamper-evidence for the public commitment ledger. Every push and PR is
# checked: if a commit modifies, renames, or deletes an already-published
# anchor or model registration (or removes an .ots proof), the build fails.
# This makes the append-only guarantee mechanically enforced in public —
# not merely asserted in prose. See INTEGRITY.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  append-only-guard:
    runs-on: ubuntu-24.04
    steps:
      # Pinned to an immutable commit SHA (not a mutable @v4 tag) for supply-chain
      # integrity. Resolved from actions/checkout@v4 on 2026-06-03.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Append-only ledger guard
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: python3 .github/scripts/check_append_only.py

  # Self-consistency: the shipped verifier must pass the sample on a clean clone
  # AND its sha256 must equal the verifier_sha256 baked into the latest anchor.
  # verify.py's hash is anchored and self-checked, so an accidental edit that
  # desyncs it from new anchors is caught here — not just detectable, prevented.
  verifier-self-consistency:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Sample verifies (both modes, zero install)
        run: |
          python3 verify.py content --predictions sample/predictions_full.json
          python3 verify.py anchor --date 2099-01-01 \
            --predictions sample/predictions_subset.json \
            --models sample/models.json --salt sample/salt.hex --repo-root sample/
      - name: verify.py sha256 matches the latest published anchor
        run: |
          python3 - <<'PY'
          import hashlib, json, pathlib, sys
          vh = hashlib.sha256(pathlib.Path("verify.py").read_bytes()).hexdigest()
          latest = sorted(pathlib.Path("anchors").glob("*.json"))[-1]
          anchored = json.load(open(latest)).get("verifier_sha256")
          if vh != anchored:
              print(f"::error::verify.py sha256 {vh[:16]}… != {latest.name} verifier_sha256 "
                    f"{(anchored or '')[:16]}… — regenerate the sample / re-anchor before shipping a verify.py edit")
              sys.exit(1)
          print(f"OK: verify.py matches {latest.name} verifier_sha256 ({vh[:16]}…)")
          PY
